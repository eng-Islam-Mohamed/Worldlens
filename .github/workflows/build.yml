name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Next.js App
        run: npm run build

      - name: Generate Capacitor Assets
        run: |
          npx @capacitor/assets generate --android
        continue-on-error: true

      - name: Sync Capacitor Android
        run: npx cap sync android || (npm run build; npx @capacitor/cli sync android)

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - name: Upload to transfer.sh
        run: curl --upload-file android/app/build/outputs/apk/debug/app-debug.apk https://transfer.sh/app-debug.apk
